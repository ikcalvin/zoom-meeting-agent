name: Deploy to GCE VM

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE_NAME: zoom-meeting-agent
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.GCE_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VM
        run: |
          ssh "${{ secrets.GCE_VM_USER }}@${{ secrets.GCE_VM_HOST }}" \
            "IMAGE_URI='${IMAGE_URI}' PROJECT_ID='${{ secrets.GCP_PROJECT_ID }}' REGION='${{ secrets.GCP_REGION }}' REPO='${{ secrets.GCP_ARTIFACT_REPO }}' IMAGE_NAME='${IMAGE_NAME}' bash -s" << 'EOF'
          set -euo pipefail

          sudo mkdir -p /opt/zoom-meeting-agent
          sudo chown -R "$USER":"$USER" /opt/zoom-meeting-agent
          cd /opt/zoom-meeting-agent

          if [ ! -f docker-compose.yml ]; then
            echo "docker-compose.yml not found at /opt/zoom-meeting-agent"
            exit 1
          fi

          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker pull "$IMAGE_URI"

          export IMAGE_URI
          docker compose up -d
          docker image prune -f
          EOF
